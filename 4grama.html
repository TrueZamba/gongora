const SONNETS=D.map(d=>({sn:d[0],tag:d[1],inc:d[2],nfg:d[3],conc:d[4],
  versos:d[5].map(v=>({vn:v[0],word:v[1],fg:v[2],texto:v[3]}))}));

// ═══ OVERVIEW MODE ═══
const ovGroup=new THREE.Group();
const ovMeshes=[];
const ovLabels=[];
const OV_SPC=1.2;

function buildOverview(){
  ovGroup.children.length=0;ovMeshes.length=0;ovLabels.length=0;
  const cx=(SONNETS.length-1)*OV_SPC/2;
  ovGroup.position.set(-cx,0,0);

  SONNETS.forEach((s,i)=>{
    const x=i*OV_SPC;
    const color=TCOL[s.tag];
    const h=0.5+s.conc*0.12; // height by concentration
    const w=0.15+s.conc*0.006;
    
    // Bar: a thin box
    const geo=new THREE.BoxGeometry(w,h,w);
    const mat=new THREE.MeshPhongMaterial({color,emissive:color,emissiveIntensity:0.15,transparent:true,opacity:0.7});
    const mesh=new THREE.Mesh(geo,mat);
    mesh.position.set(x,h/2,0);
    mesh.userData={idx:i,sonnet:s};
    ovGroup.add(mesh);ovMeshes.push(mesh);

    // Verse dots along the bar (14 small dots at different Z by their 4-gram)
    s.versos.forEach((v,vi)=>{
      const zi=(fgZ[v.fg]!==undefined?fgZ[v.fg]:0)*0.08;
      const yi=(vi/13)*h;
      const dg=new THREE.SphereGeometry(0.06,4,3);
      const dm=new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.4});
      const dot=new THREE.Mesh(dg,dm);
      dot.position.set(x,yi+0.05,zi);
      ovGroup.add(dot);
    });

    // Number label
    const cv=document.createElement('canvas');cv.width=48;cv.height=20;
    const ctx=cv.getContext('2d');ctx.font='bold 12px sans-serif';ctx.fillStyle=THEX[s.tag];
    ctx.textAlign='center';ctx.fillText(String(s.sn),24,14);
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,opacity:0.6,depthTest:false}));
    sp.position.set(x,h+0.4,0);sp.scale.set(1.2,0.5,1);
    ovGroup.add(sp);ovLabels.push(sp);
  });
  scene.add(ovGroup);
}
buildOverview();

// ═══ DETAIL MODE ═══
const dtGroup=new THREE.Group();
const dtMeshes=[];
const dtLines=[];
const dtArcs=[];
const dtWords=[];
const dtLanes=[];
const DT_SPC_X=14,DT_SPC_Y=1.7,DT_SPC_Z=1.8;

function buildDetail(indices){
  // Clear
  scene.remove(dtGroup);
  dtGroup.children.length=0;dtMeshes.length=0;dtLines.length=0;dtArcs.length=0;dtWords.length=0;dtLanes.length=0;

  const sels=indices.map(i=>SONNETS[i]);
  if(sels.length===0)return;

  // Collect all fg in selection
  const selFgs=new Set();
  sels.forEach(s=>s.versos.forEach(v=>selFgs.add(v.fg)));
  const fgList=[...selFgs].sort((a,b)=>(fgZ[a]||0)-(fgZ[b]||0));
  const localZ={};fgList.forEach((fg,i)=>localZ[fg]=i);
  const nZ=fgList.length;

  const cx=(sels.length-1)*DT_SPC_X/2;
  const cy=13*DT_SPC_Y/2;
  const cz=(nZ-1)*DT_SPC_Z/2;
  dtGroup.position.set(-cx,-cy,-cz);

  sels.forEach((s,si)=>{
    const xBase=si*DT_SPC_X;
    const color=TCOL[s.tag]||0xffffff;
    const hex=THEX[s.tag]||'#fff';
    const positions=[];

    s.versos.forEach((v,vi)=>{
      const x=xBase,y=(13-vi)*DT_SPC_Y,z=(localZ[v.fg]||0)*DT_SPC_Z;
      positions.push({x,y,z,v});

      const geo=v.vn<=8?new THREE.SphereGeometry(0.25,8,6):new THREE.DodecahedronGeometry(0.27,0);
      const mat=new THREE.MeshPhongMaterial({color,emissive:color,emissiveIntensity:0.3,transparent:true,opacity:0.88});
      const mesh=new THREE.Mesh(geo,mat);
      mesh.position.set(x,y,z);
      mesh.userData={sonnet:s,verso:v,fg:v.fg};
      dtGroup.add(mesh);dtMeshes.push(mesh);

      // Word sprite
      const cv=document.createElement('canvas');cv.width=200;cv.height=26;
      const ctx=cv.getContext('2d');ctx.font='italic 15px Georgia';ctx.fillStyle=hex;
      ctx.globalAlpha=0.85;ctx.textAlign=si<sels.length/2?'right':'left';
      ctx.fillText(v.word,si<sels.length/2?196:4,19);
      const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,opacity:0.8,depthTest:false}));
      sp.position.set(x+(si<sels.length/2?-1.8:1.8),y,z);sp.scale.set(3.5,0.45,1);
      dtGroup.add(sp);dtWords.push(sp);
    });

    // Sequence line
    const pts=positions.map(p=>new THREE.Vector3(p.x,p.y,p.z));
    const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({color,transparent:true,opacity:0.2}));
    dtGroup.add(line);dtLines.push(line);

    // Rhyme arcs
    const byFg={};
    positions.forEach(p=>{if(!byFg[p.v.fg])byFg[p.v.fg]=[];byFg[p.v.fg].push(p);});
    for(const[fg,pts2] of Object.entries(byFg)){
      if(pts2.length<2)continue;
      for(let i=0;i<pts2.length-1;i++){
        const a=pts2[i],b=pts2[i+1];
        const bow=si<sels.length/2?-2.2:2.2;
        const mid=new THREE.Vector3(a.x+bow,(a.y+b.y)/2,a.z);
        const curve=new THREE.QuadraticBezierCurve3(new THREE.Vector3(a.x,a.y,a.z),mid,new THREE.Vector3(b.x,b.y,b.z));
        const arc=new THREE.Line(new THREE.BufferGeometry().setFromPoints(curve.getPoints(20)),
          new THREE.LineBasicMaterial({color,transparent:true,opacity:0.15}));
        dtGroup.add(arc);dtArcs.push({line:arc,fg});
      }
    }

    // Name plate
    const ncv=document.createElement('canvas');ncv.width=240;ncv.height=32;
    const nctx=ncv.getContext('2d');nctx.font='bold 18px Georgia';nctx.fillStyle=hex;
    nctx.textAlign='center';nctx.fillText(`#${s.sn} [${s.tag}] ${s.nfg}fg`,120,24);
    const nsp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(ncv),transparent:true,opacity:0.9,depthTest:false}));
    nsp.position.set(xBase,14*DT_SPC_Y+1.5,cz*0.3);nsp.scale.set(5,0.6,1);
    dtGroup.add(nsp);
  });

  // Lane labels
  fgList.forEach((fg,i)=>{
    const cv=document.createElement('canvas');cv.width=80;cv.height=24;
    const ctx=cv.getContext('2d');ctx.font='bold 13px monospace';ctx.fillStyle='#64748b';
    ctx.textAlign='center';ctx.fillText(fg,40,18);
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,opacity:0.5,depthTest:false}));
    sp.position.set(-4,-1.5,i*DT_SPC_Z);sp.scale.set(2,0.5,1);
    dtGroup.add(sp);dtLanes.push({sp,fg});
  });

  // Verse number labels
  for(let vn=1;vn<=14;vn++){
    const cv=document.createElement('canvas');cv.width=36;cv.height=24;
    const ctx=cv.getContext('2d');ctx.font=(vn<=8?'':'italic ')+'13px Georgia';
    ctx.fillStyle=vn<=8?'#475569':'#334155';ctx.textAlign='center';ctx.fillText(String(vn),18,18);
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,opacity:0.4,depthTest:false}));
    sp.position.set(-6,(13-(vn-1))*DT_SPC_Y,-2);sp.scale.set(1,0.6,1);
    dtGroup.add(sp);
  }

  scene.add(dtGroup);
}

// ═══ MODE SWITCHING ═══
function enterOverview(){
  mode='overview';
  scene.remove(dtGroup);
  ovGroup.visible=true;
  document.getElementById('m-pan').classList.add('on');
  document.getElementById('m-det').classList.remove('on');
  document.getElementById('btn-detail').style.display=selected.size>=2?'':'none';
  document.getElementById('btn-back').style.display='none';
  document.getElementById('sel-info').textContent=`Clic en barras para seleccionar (máx 4) · ${selected.size} sel.`;
  camDist=50;rX=-0.2;rY=0.3;
  updateOverviewSelection();
}

function enterDetail(){
  if(selected.size<2)return;
  mode='detail';
  clearOvArcs();
  ovGroup.visible=false;
  buildDetail([...selected]);
  document.getElementById('m-pan').classList.remove('on');
  document.getElementById('m-det').classList.add('on');
  document.getElementById('btn-detail').style.display='none';
  document.getElementById('btn-back').style.display='';
  document.getElementById('sel-info').textContent=[...selected].map(i=>`#${SONNETS[i].sn}`).join(' vs ');
  camDist=42;rX=-0.12;rY=0.4;
}

function toggleSelect(idx){
  if(selected.has(idx)){selected.delete(idx);}
  else{if(selected.size>=4)return;selected.add(idx);}
  updateChips();
  updateOverviewSelection();
  document.getElementById('btn-detail').style.display=selected.size>=2?'':'none';
  document.getElementById('sel-info').textContent=`${selected.size} seleccionados`;
}

function updateOverviewSelection(){
  ovMeshes.forEach((m,i)=>{
    const sel=selected.has(i);
    m.material.emissiveIntensity=sel?0.6:0.15;
    m.material.opacity=sel?1.0:(selected.size>0?0.3:0.7);
    m.scale.set(sel?1.5:1,1,sel?1.5:1);
  });
}

function updateChips(){
  const el=document.getElementById('sel-chips');
  el.innerHTML='';
  [...selected].forEach(i=>{
    const s=SONNETS[i];
    const chip=document.createElement('span');
    chip.className='sel-chip';
    chip.style.color=THEX[s.tag];chip.style.borderColor=THEX[s.tag];
    chip.innerHTML=`#${s.sn}<span class="x">×</span>`;
    chip.onclick=()=>{toggleSelect(i);};
    el.appendChild(chip);
  });
}

// ═══ 4-GRAM FILTER ═══
const fgListEl=document.getElementById('fg-list');
FF.forEach(fg=>{
  const count=SONNETS.reduce((n,s)=>n+s.versos.filter(v=>v.fg===fg).length,0);
  const div=document.createElement('div');
  div.className='fgi';div.dataset.fg=fg;
  div.innerHTML=`<span class="fc">${fg}</span><span class="fn">${count}</span>`;
  div.onclick=()=>{
    if(activeFg===fg){clearFg();return;}
    activeFg=fg;
    document.querySelectorAll('.fgi').forEach(e=>e.classList.remove('active'));
    div.classList.add('active');
    applyFgFilter(fg);
  };
  fgListEl.appendChild(div);
});

// Panorama arcs
const ovArcs=[];
function clearOvArcs(){ovArcs.forEach(a=>ovGroup.remove(a));ovArcs.length=0;}

function applyFgFilter(fg){
  if(mode==='overview'){
    clearOvArcs();
    const matchIdx=[];
    ovMeshes.forEach((m,i)=>{
      const has=SONNETS[i].versos.some(v=>v.fg===fg);
      m.material.opacity=has?1.0:0.08;
      m.material.emissiveIntensity=has?0.5:0.05;
      if(has) matchIdx.push(i);
    });
    // Panorama: show matching count as glowing rings above each matching bar
    if(ctrl.arc){
      matchIdx.forEach(idx=>{
        const s=SONNETS[idx];
        const x=idx*OV_SPC;
        const h=0.5+s.conc*0.12;
        const nMatch=s.versos.filter(v=>v.fg===fg).length;
        const color=TCOL[s.tag]||0xf97316;
        // Ring at top of bar, size proportional to match count
        const ringR=0.15+nMatch*0.12;
        const ringGeo=new THREE.RingGeometry(ringR-0.06,ringR,16);
        const ringMat=new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.8,side:THREE.DoubleSide});
        const ring=new THREE.Mesh(ringGeo,ringMat);
        ring.position.set(x,h+0.3+ringR,0);
        ring.lookAt(camera.position);
        ovGroup.add(ring);ovArcs.push(ring);
        // Count label
        if(nMatch>1){
          const cv=document.createElement('canvas');cv.width=32;cv.height=24;
          const ctx=cv.getContext('2d');ctx.font='bold 16px sans-serif';ctx.fillStyle='#fff';
          ctx.textAlign='center';ctx.fillText(String(nMatch),16,18);
          const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,depthTest:false}));
          sp.position.set(x,h+0.3+ringR,0);sp.scale.set(0.6,0.45,1);
          ovGroup.add(sp);ovArcs.push(sp);
        }
      });
    }
  } else {
    dtMeshes.forEach(m=>{
      const match=m.userData.fg===fg;
      m.material.opacity=match?1.0:0.04;
      m.material.emissiveIntensity=match?0.8:0.05;
      m.scale.set(match?1.4:0.6,match?1.4:0.6,match?1.4:0.6);
    });
    dtWords.forEach((sp,i)=>{sp.material.opacity=0;});// hide all, reshow matching
    dtArcs.forEach(a=>{a.line.material.opacity=a.fg===fg?0.5:0.02;});
    dtLines.forEach(l=>{l.material.opacity=0.06;});
    dtLanes.forEach(ll=>{ll.sp.material.opacity=ll.fg===fg?1:0.15;});
  }
}

function clearFg(){
  activeFg=null;
  clearOvArcs();
  document.querySelectorAll('.fgi').forEach(e=>e.classList.remove('active'));
  if(mode==='overview'){
    updateOverviewSelection();
  } else {
    dtMeshes.forEach(m=>{m.material.opacity=0.88;m.material.emissiveIntensity=0.3;m.scale.set(1,1,1);});
    dtWords.forEach(sp=>{sp.material.opacity=0.8;});
    dtArcs.forEach(a=>{a.line.material.opacity=0.15;});
    dtLines.forEach(l=>{l.material.opacity=0.2;});
    dtLanes.forEach(ll=>{ll.sp.material.opacity=0.5;});
  }
}

// ═══ CONTROLS ═══
function toggleCtrl(k){ctrl[k]=!ctrl[k];document.getElementById('cb-'+k).classList.toggle('on',ctrl[k]);}

// ═══ CAMERA ═══
renderer.domElement.addEventListener('mousedown',e=>{isDrag=true;pX=e.clientX;pY=e.clientY});
window.addEventListener('mouseup',()=>isDrag=false);
window.addEventListener('mousemove',e=>{
  if(isDrag){rY+=(e.clientX-pX)*0.005;rX+=(e.clientY-pY)*0.005;rX=Math.max(-1.3,Math.min(1.3,rX));pX=e.clientX;pY=e.clientY;}
});
renderer.domElement.addEventListener('touchstart',e=>{
  if(e.touches.length===1){isDrag=true;pX=e.touches[0].clientX;pY=e.touches[0].clientY;}
},{passive:true});
renderer.domElement.addEventListener('touchend',()=>isDrag=false);
renderer.domElement.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&isDrag){
    rY+=(e.touches[0].clientX-pX)*0.005;rX+=(e.touches[0].clientY-pY)*0.005;
    rX=Math.max(-1.3,Math.min(1.3,rX));pX=e.touches[0].clientX;pY=e.touches[0].clientY;
  }
  e.preventDefault();
},{passive:false});
window.addEventListener('wheel',e=>{camDist+=e.deltaY*0.04;camDist=Math.max(10,Math.min(100,camDist));});

// Raycaster + click
const ray=new THREE.Raycaster();
const mouse=new THREE.Vector2();
const ttEl=document.getElementById('tt');

renderer.domElement.addEventListener('click',e=>{
  if(mode!=='overview')return;
  mouse.x=(e.clientX/container.clientWidth)*2-1;
  mouse.y=-((e.clientY-48)/(container.clientHeight))*2+1;
  ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(ovMeshes);
  if(hits.length>0) toggleSelect(hits[0].object.userData.idx);
});

window.addEventListener('mousemove',e=>{
  mouse.x=(e.clientX/container.clientWidth)*2-1;
  mouse.y=-((e.clientY-48)/(container.clientHeight))*2+1;
  ray.setFromCamera(mouse,camera);
  
  const targets=mode==='overview'?ovMeshes:dtMeshes;
  const hits=ray.intersectObjects(targets);
  if(hits.length>0){
    const ud=hits[0].object.userData;
    const s=ud.sonnet||SONNETS[ud.idx];
    const v=ud.verso;
    let html=`<div style="color:${THEX[s.tag]};font-weight:700">#${s.sn} [${s.tag}]</div>`;
    html+=`<div style="color:#cbd5e1;font-style:italic;font-size:11px;margin:2px 0">${s.inc}</div>`;
    html+=`<div style="color:#64748b;font-size:10px">${s.nfg} 4-gramas · conc ${s.conc}%</div>`;
    if(v) html+=`<div style="margin-top:4px;color:${THEX[s.tag]}"><b style="font-family:monospace">${v.fg}</b> ${v.word}</div><div style="color:#94a3b8;font-size:10px">v.${v.vn}: ${v.texto}</div>`;
    ttEl.innerHTML=html;ttEl.style.display='block';
    ttEl.style.left=Math.min(e.clientX+16,window.innerWidth-350)+'px';
    ttEl.style.top=(e.clientY-10)+'px';
  } else {
    ttEl.style.display='none';
  }
});

// ═══ ANIMATE ═══
function animate(){
  requestAnimationFrame(animate);
  if(ctrl.rot&&!isDrag)rY+=0.0012;
  
  if(mode==='overview'){
    ovLabels.forEach(sp=>sp.visible=ctrl.lbl);
  } else {
    dtLines.forEach(l=>{if(!activeFg)l.visible=ctrl.arc;});
    dtArcs.forEach(a=>{if(!activeFg)a.line.visible=ctrl.arc;});
    dtWords.forEach(sp=>{if(!activeFg)sp.visible=ctrl.wrd;});
  }

  const cx=Math.sin(rY)*Math.cos(rX)*camDist;
  const cy=Math.sin(rX)*camDist+(mode==='detail'?4:2);
  const cz=Math.cos(rY)*Math.cos(rX)*camDist;
  camera.position.set(cx,cy,cz);
  camera.lookAt(0,mode==='detail'?2:1,0);
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=container.clientWidth/container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth,container.clientHeight);
});
</script></body></html>
